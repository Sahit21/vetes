<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8c0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#c8ad72" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#9a7a3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8ad72" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8c0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#c8ad72" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9a7a3a" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <!-- Subtle glow behind -->
  <path d="M200 45 C145 45, 95 70, 75 115 C55 160, 50 200, 55 240 C58 265, 52 285, 48 300 C44 315, 50 330, 60 340 C70 350, 72 355, 70 365 C68 375, 75 385, 85 390 C95 395, 105 398, 110 405 C115 412, 118 420, 125 428 C132 436, 140 440, 148 442 C156 444, 162 445, 170 448 L170 498"
        stroke="url(#goldGlow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Main profile line -->
  <path d="M200 45 C145 45, 95 70, 75 115 C55 160, 50 200, 55 240 C58 265, 52 285, 48 300 C44 315, 50 330, 60 340 C70 350, 72 355, 70 365 C68 375, 75 385, 85 390 C95 395, 105 398, 110 405 C115 412, 118 420, 125 428 C132 436, 140 440, 148 442 C156 444, 162 445, 170 448 L170 498"
        stroke="url(#goldStroke)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Forehead to back of head -->
  <path d="M200 45 C240 42, 280 55, 305 85 C330 115, 340 160, 335 210 C330 260, 310 295, 285 320 C260 345, 240 365, 225 390 C215 405, 205 425, 195 450 L195 498"
        stroke="url(#goldStroke)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Ear hint -->
  <path d="M55 240 C45 245, 38 260, 40 275 C42 290, 48 298, 48 300"
        stroke="url(#goldStroke)" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <!-- Eye socket hint -->
  <path d="M80 195 C85 192, 100 190, 108 193"
        stroke="url(#goldStroke)" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <!-- Nose bridge detail -->
  <path d="M75 175 C68 210, 52 270, 48 300"
        stroke="url(#goldStroke)" stroke-width="0.8" stroke-linecap="round" opacity="0.25" stroke-dasharray="3 6"/>
</svg>
